<!DOCTYPE html>
<html>
<head>

<title>Users</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h2>Users</h2>

<table class="table table-bordered">

<tr>
<th>ID</th>
<th>Username</th>
<th>Email</th>
</tr>

{% for user in users %}

<tr>

<td>{{ user.id }}</td>
<td>{{ user.username }}</td>
<td>{{ user.email }}</td>

</tr>

{% endfor %}

</table>

<a href="/" class="btn btn-primary">Back</a>

</div>

</body>
</html>
