<!DOCTYPE html>
<html>
<head>

<title>Admin Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>

body{
background:#eef1f7;
}

.sidebar{
height:100vh;
background:#1f2937;
color:white;
position:fixed;
width:220px;
}

.sidebar h4{
padding:20px;
text-align:center;
}

.sidebar a{
display:block;
color:white;
padding:12px 20px;
text-decoration:none;
}

.sidebar a:hover{
background:#374151;
}

.content{
margin-left:230px;
padding:30px;
}

.card{
border:none;
border-radius:12px;
}

.icon{
font-size:30px;
margin-bottom:10px;
}

</style>

</head>

<body>

<!-- Sidebar -->

<div class="sidebar">

<h4>Module 1</h4>

<a href="/"><i class="fa fa-home"></i> Dashboard</a>
<a href="/login"><i class="fa fa-sign-in-alt"></i> Login</a>
<a href="/register"><i class="fa fa-user-plus"></i> Register</a>
<a href="/users"><i class="fa fa-users"></i> Users</a>

</div>

<!-- Main Content -->

<div class="content">

<h2 class="mb-4">System Dashboard</h2>

<div class="row g-4">

<div class="col-md-3">

<div class="card shadow p-4 text-center">

<div class="icon text-primary">
<i class="fa fa-users"></i>
</div>

<h6>Total Users</h6>
<h3>{{ count }}</h3>

</div>

</div>

<div class="col-md-3">

<div class="card shadow p-4 text-center">

<div class="icon text-success">
<i class="fa fa-server"></i>
</div>

<h6>System Status</h6>
<p class="text-success">Running</p>

</div>

</div>

<div class="col-md-3">

<div class="card shadow p-4 text-center">

<div class="icon text-warning">
<i class="fa fa-microchip"></i>
</div>

<h6>Server</h6>
<p>Module 1</p>

</div>

</div>

<div class="col-md-3">

<div class="card shadow p-4 text-center">

<div class="icon text-danger">
<i class="fa fa-plug"></i>
</div>

<h6>API Status</h6>
<p class="text-primary">Active</p>

</div>

</div>

</div>

<hr class="mt-5">

<h4 class="mt-4">Quick Actions</h4>

<div class="mt-3">

<a href="/login" class="btn btn-primary me-2">
<i class="fa fa-sign-in-alt"></i> Login
</a>

<a href="/register" class="btn btn-success me-2">
<i class="fa fa-user-plus"></i> Register
</a>

<a href="/users" class="btn btn-dark">
<i class="fa fa-users"></i> Manage Users
</a>
<a href="http://127.0.0.1:5001" class="btn btn-info">
Go to Module 2 Services
</a>
</div>

</div>

</body>
</html>
