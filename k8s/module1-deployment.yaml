apiVersion: apps/v1
kind: Deployment
metadata:
  name: module1-deployment

spec:
  replicas: 1

  selector:
    matchLabels:
      app: module1

  template:
    metadata:
      labels:
        app: module1

    spec:
      containers:
      - name: module1
        image: module1-image
        ports:
        - containerPort: 5000