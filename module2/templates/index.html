<!DOCTYPE html>
<html>
<head>

<title>Module 2 - Advanced Services</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>

body{
background:#f0f3f8;
}

.header{
background:#0d6efd;
color:white;
padding:20px;
text-align:center;
}

.card{
border:none;
border-radius:12px;
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.icon{
font-size:35px;
margin-bottom:10px;
}

</style>

</head>

<body>

<div class="header">
<h2>Module 2 – Advanced Services</h2>
<p>Reporting • Notifications • Analytics • API Integration</p>
</div>

<div class="container mt-5">

<div class="row g-4">

<div class="col-md-3">

<div class="card shadow text-center p-4">

<div class="icon text-primary">
<i class="fa fa-file-alt"></i>
</div>

<h5>Reports</h5>

<p>Generate system reports</p>

<a href="/report" class="btn btn-primary">Generate</a>

</div>

</div>

<div class="col-md-3">

<div class="card shadow text-center p-4">

<div class="icon text-success">
<i class="fa fa-bell"></i>
</div>

<h5>Notifications</h5>

<p>Send system alerts</p>

<a href="/notify" class="btn btn-success">Send</a>

</div>

</div>

<div class="col-md-3">

<div class="card shadow text-center p-4">

<div class="icon text-warning">
<i class="fa fa-chart-line"></i>
</div>

<h5>Analytics</h5>

<p>View usage statistics</p>

<a href="/analytics" class="btn btn-warning">View</a>

</div>

</div>

<div class="col-md-3">

<div class="card shadow text-center p-4">

<div class="icon text-dark">
<i class="fa fa-cloud"></i>
</div>

<h5>External API</h5>

<p>Fetch external data</p>

<a href="/external-api" class="btn btn-dark">Fetch</a>

</div>

</div>

</div>

<hr class="mt-5">

<div class="text-center">

<a href="http://127.0.0.1:5000" class="btn btn-outline-primary">
Go to Module 1 Dashboard
</a>

</div>

</div>

</body>
</html>
